<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>배포 이전 안내</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2933;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid #dde3ea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgba(31, 41, 51, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #52616f;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>공개 배포를 정리 중입니다</h1>
      <p>기존 공개 소스는 제거했으며, 서비스는 별도 배포 환경으로 이전됩니다.</p>
    </main>
  </body>
</html>
